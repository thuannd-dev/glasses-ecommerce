<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="32" height="32">
  <defs>
    <!-- Shadow filter for depth -->
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.4"/>
    </filter>
    
    <!-- 3D gradients for left lens (pink) -->
    <radialGradient id="lens1-3d" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#FFB3D9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C06C84;stop-opacity:1" />
    </radialGradient>
    
    <!-- 3D gradients for right lens (blue-green) -->
    <radialGradient id="lens2-3d" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#A8E6CF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6BCB77;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B7C9F;stop-opacity:1" />
    </radialGradient>
    
    <!-- Frame highlight -->
    <linearGradient id="frame-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#555;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Back shadow for depth -->
  <ellipse cx="50" cy="35" rx="38" ry="20" fill="#000" opacity="0.1"/>
  
  <!-- Left lens with 3D effect -->
  <circle cx="25" cy="30" r="15" fill="url(#lens1-3d)" stroke="#333" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="25" cy="30" r="13" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Right lens with 3D effect -->
  <circle cx="75" cy="30" r="15" fill="url(#lens2-3d)" stroke="#333" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="75" cy="30" r="13" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Bridge with 3D depth -->
  <line x1="40" y1="30" x2="60" y2="30" stroke="url(#frame-highlight)" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="40" y1="29" x2="60" y2="29" stroke="#fff" stroke-width="0.6" opacity="0.2"/>
  
  <!-- Left temple with 3D depth -->
  <line x1="10" y1="30" x2="20" y2="30" stroke="#FFB84D" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="10" y1="29" x2="20" y2="29" stroke="#FFF9E6" stroke-width="0.6" opacity="0.3"/>
  
  <!-- Right temple with 3D depth -->
  <line x1="80" y1="30" x2="90" y2="30" stroke="#FFB84D" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="80" y1="29" x2="90" y2="29" stroke="#FFF9E6" stroke-width="0.6" opacity="0.3"/>
</svg>